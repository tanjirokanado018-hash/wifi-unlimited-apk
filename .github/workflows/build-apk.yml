name: Build WiFi Unlimited APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: System deps
        run: sudo apt-get install -y git zip unzip build-essential libssl-dev libffi-dev cmake zlib1g-dev
      - name: Install buildozer
        run: pip install buildozer cython
      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
      - name: Build APK
        run: buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WiFiUnlimited-APK
          path: bin/*.apk
          retention-days: 30
