<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0D1220"/>

  <!-- WiFi arcs -->
  <!-- Outer arc -->
  <path d="M108 256 Q256 80 404 256" stroke="#2A9FFF" stroke-width="40" fill="none"
        stroke-linecap="round" opacity="1"/>
  <!-- Middle arc -->
  <path d="M158 280 Q256 160 354 280" stroke="#2A9FFF" stroke-width="36" fill="none"
        stroke-linecap="round" opacity="0.8"/>
  <!-- Inner arc -->
  <path d="M208 304 Q256 240 304 304" stroke="#2A9FFF" stroke-width="32" fill="none"
        stroke-linecap="round" opacity="0.6"/>
  <!-- Dot -->
  <circle cx="256" cy="360" r="30" fill="#2A9FFF"/>

  <!-- ∞ / lightning glyph -->
  <polygon points="256,120 290,200 260,190 296,280 222,200 254,210"
           fill="#FFD700" opacity="0.9"/>

  <!-- Bottom text -->
  <text x="256" y="470" font-family="Arial,sans-serif" font-size="38"
        font-weight="bold" fill="#2A9FFF" text-anchor="middle"
        letter-spacing="4">WIFI</text>
</svg>
